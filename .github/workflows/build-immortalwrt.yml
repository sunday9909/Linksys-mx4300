name: Build ImmortalWrt 24.10

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    # 【关键修复】显式声明写入权限，解决 "bad credentials" 报错
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgpg-error-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 \
          python3-pip python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
          uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 注意：此处 ln 命令如果 /workdir 不存在可能会报错，建议直接操作 openwrt 目录

    - name: Load custom feeds
      run: |
        [ -e $DIY_P1_SH ] && chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        [ -e $DIY_P2_SH ] && chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j8

    - name: Compile the firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Organize files
      id: organize
      run: |
        mkdir -p $GITHUB_WORKSPACE/release_firmware
        # 查找并拷贝固件
        find openwrt/bin/targets/ -name "*factory.bin" -exec cp {} $GITHUB_WORKSPACE/release_firmware/ \;
        # 【关键修复】定义 Release 标签名
        echo "RELEASE_TAG=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        # 【关键修复】显式定义 FIRMWARE 变量路径
        echo "FIRMWARE_PATH=$GITHUB_WORKSPACE/release_firmware" >> $GITHUB_ENV
        if [ "$(ls -A $GITHUB_WORKSPACE/release_firmware/)" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        fi

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        body: |
          ### ImmortalWrt 24.10 for LINKSYS-MX4300
          - **Default IP:** 192.168.5.1
          - **Hostname:** LINKSYS-MX4300
          - **Included:** Nikki, Taskplan, ParentControl, Edge Theme, AirConnect/AirPlay2
        # 【关键修复】使用上面定义的 FIRMWARE_PATH 变量
        files: ${{ env.FIRMWARE_PATH }}/*

